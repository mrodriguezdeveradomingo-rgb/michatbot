<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      text-align: center;
      margin-top: 20px;
    }
    #botpress-chat {
      width: 100%;
      max-width: 500px;
      height: 600px;
    }
  </style>
</head>
<body>
  <h1>Bienvenido a mi Chatbot</h1>

  <!-- Contenedor para el chat -->
  <div id="botpress-chat"></div>

  <!-- Código de Botpress -->
  <script src="https://cdn.botpress.cloud/webchat/v1/inject.js"></script>
  <script>
    window.botpressWebChat.init({
      botId: "f74d2c36-9aad-4dfa-8f21-877543f9e1f0",  // 
      container: '#botpress-chat',
      enableReset: true,
      showPoweredBy: false
    })
  </script>
</body>
</html>
